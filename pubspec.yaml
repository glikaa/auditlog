name: my_app
description: Flutter app with user profile feature.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1

  # Image picking (avatar upload)
  image_picker: ^1.1.2

  # Functional programming / error handling
  dartz: ^0.10.1

  # Local storage
  shared_preferences: ^2.2.3

  # Logging
  logger: ^2.4.0

  # Google Fonts – Noto Sans for full Latin Extended + Emoji support
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  generate: true  # Required for l10n code generation


